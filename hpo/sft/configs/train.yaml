defaults:
  - hydra: base
  - model: 1b                 # select with model=1b or model=7b on the CLI
  - experiment: null          # select with experiment=<name> on the CLI
  - hydra/sweeper/params: null
  - _self_
  - override hydra/launcher: tamia

# Compute: 4xH100, single node
num_processes: 4

# Training hyperparams
max_seq_length: 4096
lr_scheduler_type: linear
warmup_ratio: 0.03
weight_decay: 0.0
num_train_epochs: 1
seed: 1
max_train_steps: null

# Dataset caching
dataset_skip_cache: false
cache_dataset_only: false
dataset_local_cache_dir: local_dataset_cache
dataset_use_per_source_cache: true

# Checkpointing
# Save checkpoints periodically each epoch and keep the latest 3.
# Set checkpointing_steps to an integer string (e.g. "200") for step-based saves.
checkpointing_steps: 2000
keep_last_n_checkpoints: -1
clean_checkpoints_at_end: false
save_initial_checkpoint: false  # save a step_0 checkpoint before training starts

output_root: /home/l/leog/links/projects/aip-glaj/leog/results

# W&B project name (must match finetune.py's --wandb_project_name default)
wandb_project: open_instruct
# W&B entity — leave null to use WANDB_ENTITY env var or wandb's default
wandb_entity: guillaume-lajoie
# Optional sweep identifier logged as a W&B tag and run group
sweep_id: null

# Eval: optionally run lm_eval after training completes
eval:
  enabled: false
  eval_suite: full   # required when enabled=true, e.g. eval_suite=quick
